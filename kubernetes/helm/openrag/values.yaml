# OpenRAG Helm Chart Values
# This chart deploys OpenRAG with external OpenSearch SaaS connection

# Override names
nameOverride: ""
fullnameOverride: ""

# Global settings
global:
  # Tenant identification - used for resource naming and namespace
  tenant:
    name: ""                              # Required for multi-tenant: tenant identifier (e.g., "acme")
    namespace: ""                         # Optional: override namespace (defaults to tenant name or release namespace)

  # Image settings
  imageRegistry: "langflowai"
  imagePullPolicy: IfNotPresent
  imageTag: "latest"                      # Override with specific version in production
  imagePullSecrets: []

  # External OpenSearch SaaS connection (OpenSearch is NOT deployed by this chart)
  opensearch:
    # host: "opensearch-coordinating.opensearch.svc.cluster.local"                              # Required: OpenSearch SaaS endpoint (e.g., "my-cluster.us-east-1.es.amazonaws.com")
    port: 9200                             # Default HTTPS port for managed OpenSearch
    langflowHost: ""                      # Optional: Langflow-specific OpenSearch host
    langflowPort: ""                      # Optional: Langflow-specific OpenSearch port
    scheme: "https"                       # https for production SaaS
    username: "admin"                     # OpenSearch username
    password: ""                          # OpenSearch password (stored in secret)
    indexName: "documents"                # OpenSearch index name

  docling:
    host: docling-serve.docling.svc.cluster.local
    port: 5001
    scheme: "http"

  # Shared OAuth credentials (same across all tenants)
  oauth:
    google:
      enabled: false
      clientId: ""                        # Google OAuth client ID
      clientSecret: ""                    # Google OAuth client secret
    microsoft:
      enabled: false
      clientId: ""                        # Microsoft Graph OAuth client ID
      clientSecret: ""                    # Microsoft Graph OAuth client secret
  ibmcos:
    enabled: false
    accessKeyId: ""                     # IBM Cloud Object Storage access key ID
    secretAccessKey: ""                 # IBM Cloud Object Storage secret access key
    endpoint: ""                       # IBM Cloud Object Storage endpoint
  aws:
    enabled: false
    accessKeyId: ""
    secretAccessKey: ""
    region: ""
      
# ============================================================================
# Langflow Configuration
# ============================================================================
langflow:
  enabled: true

  image:
    repository: langflowai/openrag-langflow
    tag: ""                               # Uses global.imageTag if empty

  # Single pod - vertical scaling only (SQLite requires single writer)
  replicaCount: 1

  # Resource requests/limits for vertical scaling
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "4"
      memory: "8Gi"

  # Persistence for SQLite DB and flows
  persistence:
    enabled: true
    storageClass: ""                      # Empty uses cluster default
    accessMode: ReadWriteOnce
    size: 10Gi
    mountPath: /app/data
    flowsSubPath: flows
    dbSubPath: langflow.db

  # Flow configuration (UUIDs for Langflow workflows)
  flows:
    loadDefaults: true                        # Load default OpenRAG flows on first deployment
    git:
      enabled: true
      owner: langflow-ai
      repo: openrag
      branch: main
      # Optional: specific git commit hash (overrides branch if set)
      #hash: ""
      path: flows
      files:
        - ingestion_flow.json
        - openrag_agent.json
        - openrag_nudges.json
        - openrag_url_mcp.json
    chatFlowId: "1098eea1-6649-4e1d-aed1-b77249fb8dd0"
    ingestFlowId: "5488df7c-b93f-4f87-a446-b67028bc0813"
    urlIngestFlowId: "72c3d17c-2dac-4a73-b48a-6518473d7830"
    nudgesFlowId: "ebc01d31-1976-46ce-a385-b0240327226c"
    loadPath: /app/flows

  # Authentication settings
  auth:
    autoLogin: false
    skipAuthAutoLogin: false
    superuser: "admin"                    # Langflow superuser username
    superuserPassword: ""                 # Langflow superuser password (stored in secret)
    apiKey: ""                            # Optional: pre-generated API key
    keyRetries: 15                        # Number of retries for key generation
    keyRetryDelay: 2.0                    # Delay between retries
    secretKey: ""                         # Langflow secret key for JWT (stored in secret)
    newUserIsActive: false
    enableSuperuserCli: false

  # Runtime settings
  deactivateTracing: true
  logLevel: "INFO"                        # DEBUG, INFO, WARNING, ERROR
  doclingServeUrl: "http://host.docker.internal:5001"
  openragQueryFilter: "{}"

  # Flow context default variables (injected into every flow execution)
  flowDefaults:
    jwt: "None"
    owner: "None"
    ownerName: "None"
    ownerEmail: "None"
    connectorType: "system"
    connectorTypeUrl: "url"
    documentId: ""
    sourceUrl: ""
    allowedUsers: "[]"
    allowedGroups: "[]"
    filename: "None"
    mimetype: "None"
    filesize: "0"
    selectedEmbeddingModel: ""

  backend:
    externalDatabase:
      enabled: true
      driver:
        value: "postgresql"
      port:
        value: "5432"
      user:
        value: "langflow"
      password:
        valueFrom:
          secretKeyRef:
            key: "password"
            name: "openrag-langflow-dbpassword"
      database:
        value: "langflow-db"
    sqlite:
      enabled: false
      
  # Langfuse Tracking
  langfuse:
    secretKey: ""
    publicKey: ""
    host: "https://cloud.langfuse.com"

  # Variables to expose to flows
  variablesToGetFromEnvironment: "JWT,OPENRAG-QUERY-FILTER,OPENSEARCH_PASSWORD,OPENSEARCH_URL,OPENSEARCH_INDEX_NAME,DOCLING_SERVE_URL,OWNER,OWNER_NAME,OWNER_EMAIL,CONNECTOR_TYPE,DOCUMENT_ID,SOURCE_URL,ALLOWED_USERS,ALLOWED_GROUPS,FILENAME,MIMETYPE,FILESIZE,SELECTED_EMBEDDING_MODEL,OPENAI_API_KEY,ANTHROPIC_API_KEY,WATSONX_APIKEY,WATSONX_URL,WATSONX_PROJECT_ID,OLLAMA_BASE_URL"

  # Probes
  livenessProbe:
    enabled: true
    initialDelaySeconds: 60
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 3
  readinessProbe:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  # Service configuration
  service:
    type: ClusterIP
    port: 7860

# ============================================================================
# OpenRAG Backend Configuration
# ============================================================================
backend:
  enabled: true

  # StorageClass templating fields
  storageClassName: ""
  storageClassAnnotations: {}
  storageClassLabels: {}
  storageClassProvisioner: ""
  storageClassParameters: {}
  storageClassReclaimPolicy: ""
  storageClassVolumeBindingMode: ""
  storageClassAllowVolumeExpansion: ""

  encryption:
    key: ""                               # Optional encryption key for at-rest encryption of confg data
  auth:
    ibmCloud:
      enabled: false

  image:
    repository: langflowai/openrag-backend
    tag: ""                               # Uses global.imageTag if empty

  oauthBrokerUrl: ""                      # Public return URL for OAuth redirects

  # Single pod for vertical scaling
  replicaCount: 1

  # Resource requests/limits
  resources:
    requests:
      cpu: "500m"
      memory: "2Gi"
    limits:
      cpu: "4"
      memory: "16Gi"

  # Logging and Service
  logFormat: "json"                       # json or text
  logLevel: "INFO"                        # DEBUG, INFO, WARNING, ERROR
  serviceName: "openrag"

  # Authentication
  auth:
    sessionSecret: ""                     # Session secret (stored in secret, auto-generated if empty)

  # Persistence for documents, keys, and config
  persistence:
    documents:
      enabled: true
      storageClass: ""
      accessMode: ReadWriteOnce
      size: 50Gi
      mountPath: /app/openrag-documents
      loadDefaults: true                        # Load default documents on first deployment
      git:
        enabled: true
        owner: langflow-ai
        repo: openrag
        branch: main
        # Optional: specific git commit hash (overrides branch if set)
        #hash: ""
        path: openrag-documents
        files:
          - docling.pdf
          - ibm_anthropic.pdf
          - openrag-documentation.pdf
          - warmup_ocr.pdf
    keys:
      enabled: true
      storageClass: ""
      accessMode: ReadWriteOnce
      size: 1Gi
      mountPath: /app/keys
    config:
      enabled: true
      storageClass: ""
      accessMode: ReadWriteOnce
      size: 1Gi
      mountPath: /app/config

  # Logging
  logLevel: "INFO"                        # DEBUG, INFO, WARNING, ERROR, CRITICAL
  noColor: false                          # Set true to disable ANSI color codes in log output
  accessLog: true                         # Set false to disable HTTP access log events

  # Timeouts
  langflowTimeout: 2400                   # seconds; total timeout for Langflow HTTP calls (default: 40 min)
  langflowConnectTimeout: 30              # seconds; connection timeout for Langflow HTTP calls
  ingestionTimeout: 3600                  # seconds; per-file processing timeout for ingestion tasks

  # Concurrency
  uploadBatchSize: 25                     # Max files per batch when ingesting from a folder
  maxWorkers: ""                          # Backend worker processes; empty = auto (min(4, CPU_COUNT // 2))

  # Feature flags
  features:
    disableIngestWithLangflow: false      # Set true to use traditional processor instead of Langflow
    ingestSampleData: true                # Set true to ingest sample data on startup

  # Langflow public URL (for UI links to Langflow)
  langflowPublicUrl: ""                   # e.g., "https://langflow.example.com"

  # Webhook configuration for continuous ingestion
  webhook:
    enabled: false
    baseUrl: ""                           # DNS routable URL for webhooks (e.g., ngrok URL)

  # Probes
  livenessProbe:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 3
  readinessProbe:
    enabled: true
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  # Service configuration
  service:
    type: ClusterIP
    port: 8000

# ============================================================================
# OpenRAG Frontend Configuration
# ============================================================================
frontend:
  enabled: true

  image:
    repository: langflowai/openrag-frontend
    tag: ""                               # Uses global.imageTag if empty

  # Can be multiple replicas (stateless)
  replicaCount: 2

  # Resource requests/limits
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "1"
      memory: "1Gi"

  # Horizontal Pod Autoscaler
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

  # Probes
  livenessProbe:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    enabled: true
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

  # Service configuration
  service:
    type: ClusterIP
    port: 3000

# ============================================================================
# OpenSearch Dashboards Configuration (Optional)
# ============================================================================
dashboards:
  enabled: false                          # Enable only if dashboards available in OS SaaS

  image:
    repository: opensearchproject/opensearch-dashboards
    tag: "3.0.0"

  replicaCount: 1

  # Resource requests/limits
  resources:
    requests:
      cpu: "100m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "2Gi"

  # Probes
  livenessProbe:
    enabled: true
    initialDelaySeconds: 60
    periodSeconds: 30
  readinessProbe:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 10

  # Service configuration
  service:
    type: ClusterIP
    port: 5601

# ============================================================================
# PostgreSQL Configuration
# ============================================================================
postgres:
  enabled: false                          # Enable to deploy PostgreSQL for Langflow

  image:
    repository: postgres
    tag: "16-alpine"

  # Single pod for PostgreSQL
  replicaCount: 1

  # Database configuration
  database: "langflow"
  username: "langflow"
  # Note: Password is auto-generated and stored securely in Kubernetes secret

  # Resource requests/limits
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "2"
      memory: "4Gi"

  # Persistence for PostgreSQL data
  persistence:
    enabled: true
    storageClass: ""                      # Empty uses cluster default
    accessMode: ReadWriteOnce
    size: 10Gi
    mountPath: /var/lib/postgresql/data

  # Probes
  livenessProbe:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    enabled: true
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

  # Service configuration
  service:
    type: ClusterIP
    port: 5432

# ============================================================================
# Ingress Configuration
# ============================================================================
ingress:
  enabled: true
  className: "nginx"                      # nginx, alb, traefik, etc.

  # Annotations for ingress controller
  annotations: {}
    # For nginx:
    # nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    # nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    # For AWS ALB:
    # alb.ingress.kubernetes.io/scheme: internet-facing
    # alb.ingress.kubernetes.io/target-type: ip

  # Host configuration
  hosts:
    frontend:
      host: ""                            # e.g., "openrag.example.com"
      paths:
        - path: /
          pathType: Prefix
    backend:
      host: ""                            # e.g., "api.openrag.example.com"
      paths:
        - path: /
          pathType: Prefix
    langflow:
      enabled: false                      # Optional: expose Langflow directly
      host: ""                            # e.g., "langflow.openrag.example.com"
      paths:
        - path: /
          pathType: Prefix
    dashboards:
      enabled: false                      # Only if dashboards.enabled is true
      host: ""
      paths:
        - path: /
          pathType: Prefix

  # TLS configuration
  tls:
    enabled: false
    # Use existing secret:
    # secretName: "openrag-tls"

    # Or use cert-manager:
    certManager:
      enabled: false
      issuerRef:
        name: "letsencrypt-prod"
        kind: "ClusterIssuer"

# ============================================================================
# LLM Provider API Keys
# ============================================================================
llmProviders:
  openai:
    enabled: false
    apiKey: ""                            # OpenAI API key (stored in secret)
  anthropic:
    enabled: false
    apiKey: ""                            # Anthropic API key (stored in secret)
  watsonx:
    enabled: false
    apiKey: ""                            # WatsonX API key (stored in secret)
    endpoint: "https://us-south.ml.cloud.ibm.com"
    projectId: ""                         # WatsonX project ID
  ollama:
    enabled: false
    endpoint: ""                          # Ollama endpoint URL (e.g., "http://ollama:11434")

# ============================================================================
# Application Config (config.yaml contents)
# ============================================================================
appConfig:
  agent:
    llmModel: "claude-sonnet-4-5-20250929"
    llmProvider: "anthropic"
    # System prompt can be customized here
    systemPrompt: ""                      # Leave empty to use default
  knowledge:
    chunkOverlap: 200
    chunkSize: 1000
    embeddingModel: "text-embedding-3-large"
    embeddingProvider: "openai"
    ocr: false
    pictureDescriptions: false
    tableStructure: true

# ============================================================================
# Service Account
# ============================================================================
serviceAccount:
  create: true
  name: ""
  annotations: {}

# ============================================================================
# Pod Security
# ============================================================================
podSecurityContext:
  fsGroup: 1000
  runAsNonRoot: true

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  runAsUser: 1000
  runAsGroup: 1000

# ============================================================================
# Node Placement
# ============================================================================
nodeSelector: {}

tolerations: []

affinity: {}

# ============================================================================
# Pod Disruption Budgets
# ============================================================================
podDisruptionBudget:
  enabled: false
  minAvailable: 1
  # maxUnavailable: 1
