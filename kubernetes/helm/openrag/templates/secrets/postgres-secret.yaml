{{- if .Values.postgres.enabled }}
{{- $secretName := printf "%s-postgres" (include "openrag.fullname" .) }}
{{- $secretNamespace := include "openrag.namespace" . }}
{{- $existingSecret := lookup "v1" "Secret" $secretNamespace $secretName }}
{{- $password := "" }}
{{- if $existingSecret }}
{{- $password = index $existingSecret.data "postgres-password" | b64dec }}
{{- else }}
{{- $password = include "openrag.postgres.password" . }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ $secretNamespace }}
  labels:
    {{- include "openrag.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  postgres-password: {{ $password | b64enc }}
{{- end }}

