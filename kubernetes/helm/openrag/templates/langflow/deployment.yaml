{{- if .Values.langflow.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openrag.fullname" . }}-langflow
  namespace: {{ include "openrag.namespace" . }}
  labels:
    {{- include "openrag.langflow.labels" . | nindent 4 }}
spec:
  replicas: 1  # Always 1 for SQLite-based Langflow
  strategy:
    type: Recreate  # Required for RWO PVC
  selector:
    matchLabels:
      {{- include "openrag.langflow.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "openrag.langflow.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/secret: {{ include (print $.Template.BasePath "/secrets/langflow-secret.yaml") . | sha256sum }}
        checksum/config: {{ include (print $.Template.BasePath "/configmaps/flow-ids-configmap.yaml") . | sha256sum }}
        checksum/dotenv: {{ include (print $.Template.BasePath "/templates/langflow/langflow-dotenv.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "openrag.serviceAccountName" . }}

      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- if and .Values.langflow.flows.loadDefaults .Values.langflow.flows.git.enabled }}
      initContainers:
        - name: load-default-flows
          image: curlimages/curl:8.5.0
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu

              FLOWS_DIR="{{ .Values.langflow.persistence.mountPath }}/{{ .Values.langflow.persistence.flowsSubPath }}"

              OWNER="{{ .Values.langflow.flows.git.owner }}"
              REPO="{{ .Values.langflow.flows.git.repo }}"
              BRANCH="{{ .Values.langflow.flows.git.branch }}"
              {{- if .Values.langflow.flows.git.hash }}
              GIT_REF="{{ .Values.langflow.flows.git.hash }}"
              {{- else }}
              GIT_REF="${BRANCH}"
              {{- end }}
              REPO_PATH="{{ .Values.langflow.flows.git.path }}"

              # Raw base URL: https://raw.githubusercontent.com/<owner>/<repo>/<ref>/<path>
              GITHUB_RAW_URL="https://raw.githubusercontent.com/${OWNER}/${REPO}/${GIT_REF}/${REPO_PATH}"

              mkdir -p "$FLOWS_DIR"

              if [ -z "$(ls -A "$FLOWS_DIR" 2>/dev/null)" ]; then
                echo "Loading default flows from ${OWNER}/${REPO}@${GIT_REF}/${REPO_PATH} ..."

                download_with_retry() {
                  file="$1"
                  url="${GITHUB_RAW_URL}/${file}"
                  dest="${FLOWS_DIR}/${file}"
                  max_retries=3
                  timeout=60
                  retry=0

                  while [ "$retry" -lt "$max_retries" ]; do
                    echo "Downloading ${file} (attempt $((retry + 1))/${max_retries})..."
                    if curl -f -L -m "$timeout" -o "$dest" "$url"; then
                      echo "OK: ${file}"
                      return 0
                    fi
                    retry=$((retry + 1))
                    if [ "$retry" -lt "$max_retries" ]; then
                      echo "Retrying ${file}..."
                      sleep 2
                    fi
                  done

                  echo "ERROR: Failed to download ${file} from ${url}"
                  return 1
                }

                failed=0
{{- range .Values.langflow.flows.git.files }}
                if ! download_with_retry "{{ . }}"; then failed=1; fi
{{- end }}

                if [ "$failed" -eq 1 ]; then
                  echo "ERROR: One or more flows failed to download"
                  exit 1
                fi

                echo "Flows loaded: $(ls "$FLOWS_DIR")"
              else
                echo "Flows already exist in $FLOWS_DIR, skipping download."
              fi
          volumeMounts:
            - name: langflow-data
              mountPath: {{ .Values.langflow.persistence.mountPath }}
      {{- end }}

      containers:
        - name: langflow
          image: "{{ .Values.langflow.image.repository }}:{{ .Values.langflow.image.tag | default .Values.global.imageTag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}

          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          ports:
            - name: http
              containerPort: 7860
              protocol: TCP

          command: ["langflow", "run", "--env-file", "/app/.env"]

          volumeMounts:
            - name: openrag-langflow-dotenv
              mountPath: /app/.env
              subPath: .env
              readOnly: true
            - name: langflow-data
              mountPath: {{ .Values.langflow.persistence.mountPath }}

          resources:
            {{- toYaml .Values.langflow.resources | nindent 12 }}

          {{- if .Values.langflow.livenessProbe.enabled }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: {{ .Values.langflow.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.langflow.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.langflow.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.langflow.livenessProbe.failureThreshold }}
          {{- end }}

          {{- if .Values.langflow.readinessProbe.enabled }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: {{ .Values.langflow.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.langflow.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.langflow.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.langflow.readinessProbe.failureThreshold }}
          {{- end }}

      volumes:
        - name: openrag-langflow-dotenv
          secret:
            secretName: {{ include "openrag.fullname" . }}-langflow-dotenv
            defaultMode: 0400
            items:
              - key: .env
                path: .env
        - name: langflow-data
          {{- if .Values.langflow.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "openrag.fullname" . }}-langflow
          {{- else }}
          emptyDir: {}
          {{- end }}

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
