{{- if .Values.backend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openrag.fullname" . }}-backend
  namespace: {{ include "openrag.namespace" . }}
  labels:
    {{- include "openrag.backend.labels" . | nindent 4 }}
spec:
  replicas: 1  # Single pod for vertical scaling
  strategy:
    type: Recreate  # Required for RWO PVCs
  selector:
    matchLabels:
      {{- include "openrag.backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "openrag.backend.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/secret-opensearch: {{ include (print $.Template.BasePath "/secrets/opensearch-secret.yaml") . | sha256sum }}
        checksum/secret-langflow: {{ include (print $.Template.BasePath "/secrets/langflow-secret.yaml") . | sha256sum }}
        checksum/config-flows: {{ include (print $.Template.BasePath "/configmaps/flow-ids-configmap.yaml") . | sha256sum }}
        checksum/config-app: {{ include (print $.Template.BasePath "/configmaps/app-config-configmap.yaml") . | sha256sum }}
        checksum/secret-backend: {{ include (print $.Template.BasePath "/secrets/backend-secret.yaml") . | sha256sum }}
        checksum/secret-dotenv: {{ include (print $.Template.BasePath "/templates/backend/backend-dotenv.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "openrag.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        {{- if and .Values.backend.persistence.documents.enabled .Values.backend.persistence.documents.loadDefaults .Values.backend.persistence.documents.git.enabled }}
        - name: load-default-documents
          image: curlimages/curl:8.5.0
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu

              DOCS_DIR="{{ .Values.backend.persistence.documents.mountPath }}"

              OWNER="{{ .Values.backend.persistence.documents.git.owner }}"
              REPO="{{ .Values.backend.persistence.documents.git.repo }}"
              BRANCH="{{ .Values.backend.persistence.documents.git.branch }}"
              {{- if .Values.backend.persistence.documents.git.hash }}
              GIT_REF="{{ .Values.backend.persistence.documents.git.hash }}"
              {{- else }}
              GIT_REF="${BRANCH}"
              {{- end }}
              REPO_PATH="{{ .Values.backend.persistence.documents.git.path }}"

              # Raw base URL: https://raw.githubusercontent.com/<owner>/<repo>/<ref>/<path>
              GITHUB_RAW_URL="https://raw.githubusercontent.com/${OWNER}/${REPO}/${GIT_REF}/${REPO_PATH}"

              mkdir -p "$DOCS_DIR"

              if [ -z "$(ls -A "$DOCS_DIR" 2>/dev/null)" ]; then
                echo "Loading default documents from ${OWNER}/${REPO}@${GIT_REF}/${REPO_PATH} ..."

                download_with_retry() {
                  file="$1"
                  url="${GITHUB_RAW_URL}/${file}"
                  dest="${DOCS_DIR}/${file}"
                  max_retries=3
                  timeout=60
                  retry=0

                  while [ "$retry" -lt "$max_retries" ]; do
                    echo "Downloading ${file} (attempt $((retry + 1))/${max_retries})..."
                    if curl -f -L -m "$timeout" -o "$dest" "$url"; then
                      echo "OK: ${file}"
                      return 0
                    fi
                    retry=$((retry + 1))
                    if [ "$retry" -lt "$max_retries" ]; then
                      echo "Retrying ${file}..."
                      sleep 2
                    fi
                  done

                  echo "ERROR: Failed to download ${file} from ${url}"
                  return 1
                }

                failed=0
{{- range .Values.backend.persistence.documents.git.files }}
                if ! download_with_retry "{{ . }}"; then failed=1; fi
{{- end }}

                if [ "$failed" -eq 1 ]; then
                  echo "ERROR: One or more documents failed to download"
                  exit 1
                fi

                echo "Documents loaded: $(ls "$DOCS_DIR")"
              else
                echo "Documents already exist in $DOCS_DIR, skipping download."
              fi
          volumeMounts:
            - name: documents
              mountPath: {{ .Values.backend.persistence.documents.mountPath }}
        {{- end }}
        {{- if .Values.langflow.enabled }}
        - name: wait-for-langflow
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for Langflow to be ready..."
              until nc -z {{ include "openrag.fullname" . }}-langflow {{ .Values.langflow.service.port }}; do
                echo "Langflow not ready, sleeping 5s..."
                sleep 5
              done
              echo "Langflow is ready!"
        {{- end }}
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag | default .Values.global.imageTag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          volumeMounts:
            - name: openrag-dotenv
              mountPath: /app/.env
              subPath: .env
              readOnly: true
            {{- if .Values.backend.persistence.documents.enabled }}
            - name: documents
              mountPath: {{ .Values.backend.persistence.documents.mountPath }}
            {{- end }}
            {{- if .Values.backend.persistence.keys.enabled }}
            - name: keys
              mountPath: {{ .Values.backend.persistence.keys.mountPath }}
            {{- end }}
            {{- if .Values.backend.persistence.config.enabled }}
            - name: config
              mountPath: {{ .Values.backend.persistence.config.mountPath }}
            {{- end }}
            {{- if .Values.langflow.persistence.enabled }}
            - name: flows
              mountPath: /app/flows
              subPath: {{ .Values.langflow.persistence.flowsSubPath }}
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          {{- if .Values.backend.livenessProbe.enabled }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: {{ .Values.backend.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.backend.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.backend.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.backend.livenessProbe.failureThreshold }}
          {{- end }}
          {{- if .Values.backend.readinessProbe.enabled }}
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - |
                  set -eu
                  FAILED=0

                  # Langflow health
                  echo "Checking Langflow..."
                  if ! curl -sf "{{ include "openrag.langflow.url" . }}/health" >/dev/null 2>&1; then
                    echo "ERROR: Langflow health check failed at {{ include "openrag.langflow.url" . }}/health"
                    FAILED=1
                  else
                    echo "Langflow: OK"
                  fi

                  echo "All health checks passed"
                  exit 0
            initialDelaySeconds: {{ .Values.backend.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.backend.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.backend.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.backend.readinessProbe.failureThreshold }}
          {{- end }}
      volumes:
        - name: openrag-dotenv
          secret:
            secretName: {{ include "openrag.fullname" . }}-dotenv
            defaultMode: 0400
            items:
              - key: .env
                path: .env
        {{- if .Values.backend.persistence.documents.enabled }}
        - name: documents
          emptyDir: {}
        {{- end }}
        {{- if .Values.backend.persistence.keys.enabled }}
        - name: keys
          persistentVolumeClaim:
            claimName: {{ include "openrag.fullname" . }}-keys
        {{- end }}
        {{- if .Values.backend.persistence.config.enabled }}
        - name: config
          persistentVolumeClaim:
            claimName: {{ include "openrag.fullname" . }}-config
        {{- end }}
        {{- if .Values.langflow.persistence.enabled }}
        - name: flows
          persistentVolumeClaim:
            claimName: {{ include "openrag.fullname" . }}-langflow
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
